name: Fetch GitHub Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch GitHub data
        env:
          GH_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        run: |
          set -e

          AUTH="Authorization: token $GH_TOKEN"
          ACCEPT="Accept: application/vnd.github.v3+json"

          USERNAME=$(curl -s -H "$AUTH" -H "$ACCEPT" https://api.github.com/user | jq -r '.login')
          echo "User: $USERNAME"

          # ── Fetch all repos (paginated) ──
          REPOS="[]"
          PAGE=1
          while true; do
            BATCH=$(curl -s -H "$AUTH" -H "$ACCEPT" \
              "https://api.github.com/user/repos?per_page=100&page=$PAGE&sort=pushed&affiliation=owner")
            COUNT=$(echo "$BATCH" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then break; fi
            REPOS=$(echo "$REPOS $BATCH" | jq -s '.[0] + .[1]')
            PAGE=$((PAGE + 1))
          done

          REPO_COUNT=$(echo "$REPOS" | jq 'length')
          ORIGINALS=$(echo "$REPOS" | jq '[.[] | select(.fork == false)] | length')
          FORKS=$(echo "$REPOS" | jq '[.[] | select(.fork == true)] | length')
          echo "Found $REPO_COUNT repos ($ORIGINALS original, $FORKS forks)"

          # ── Get commit counts per repo + fetch recent commits directly ──
          TOTAL_COMMITS=0
          REPO_DETAILS="[]"
          ALL_COMMITS="[]"
          SINCE_DATE=$(date -u -d '365 days ago' +%Y-%m-%dT00:00:00Z 2>/dev/null || date -u -v-365d +%Y-%m-%dT00:00:00Z)
          echo "Fetching commits since $SINCE_DATE"

          for FULL_NAME in $(echo "$REPOS" | jq -r '.[].full_name'); do
            REPO_NAME=$(echo "$FULL_NAME" | cut -d'/' -f2)

            # Total commit count via pagination trick
            RESPONSE=$(curl -s -I -H "$AUTH" -H "$ACCEPT" \
              "https://api.github.com/repos/$FULL_NAME/commits?per_page=1" 2>&1)

            LINK=$(echo "$RESPONSE" | grep -i '^link:' || echo "")
            if echo "$LINK" | grep -q 'rel="last"'; then
              RCOUNT=$(echo "$LINK" | sed 's/.*page=\([0-9]*\)>; rel="last".*/\1/')
            else
              # Check if the repo has any commits at all
              CHECK=$(curl -s -H "$AUTH" -H "$ACCEPT" \
                "https://api.github.com/repos/$FULL_NAME/commits?per_page=1")
              if echo "$CHECK" | jq -e 'type == "array" and length > 0' > /dev/null 2>&1; then
                RCOUNT=1
              else
                RCOUNT=0
              fi
            fi

            if ! [[ "$RCOUNT" =~ ^[0-9]+$ ]]; then
              RCOUNT=0
            fi

            TOTAL_COMMITS=$((TOTAL_COMMITS + RCOUNT))
            REPO_DETAILS=$(echo "$REPO_DETAILS" | jq --arg name "$REPO_NAME" --argjson count "$RCOUNT" '. + [{"name": $name, "commits": $count}]')

            # Skip repos with 0 commits
            if [ "$RCOUNT" -eq 0 ]; then
              echo "  $REPO_NAME: 0 total, skipped"
              continue
            fi

            # Fetch recent commits (last 12 months, paginated up to 3 pages)
            REPO_COMMITS="[]"
            for CP in 1 2 3; do
              PAGE_COMMITS=$(curl -s -H "$AUTH" -H "$ACCEPT" \
                "https://api.github.com/repos/$FULL_NAME/commits?per_page=100&page=$CP&since=$SINCE_DATE" 2>/dev/null)

              if ! echo "$PAGE_COMMITS" | jq -e 'type == "array" and length > 0' > /dev/null 2>&1; then
                break
              fi

              REPO_COMMITS=$(echo "$REPO_COMMITS $PAGE_COMMITS" | jq -s '.[0] + .[1]')

              if [ "$(echo "$PAGE_COMMITS" | jq 'length')" -lt 100 ]; then
                break
              fi
            done

            # Tag with repo name
            TAGGED=$(echo "$REPO_COMMITS" | jq --arg repo "$REPO_NAME" '[.[]? | {
              repo: $repo,
              sha: (.sha // "")[0:7],
              message: ((.commit.message // "") | split("\n")[0][0:80]),
              date: (.commit.author.date // .commit.committer.date // ""),
              author: (.commit.author.name // "unknown")
            }]' 2>/dev/null || echo "[]")

            ALL_COMMITS=$(echo "$ALL_COMMITS $TAGGED" | jq -s '.[0] + .[1]')

            echo "  $REPO_NAME: $RCOUNT total, $(echo "$TAGGED" | jq 'length') recent"
          done

          echo "Total commits across all repos: $TOTAL_COMMITS"
          echo "Recent commits fetched: $(echo "$ALL_COMMITS" | jq 'length')"

          # ── Build commits by day ──
          COMMITS_BY_DAY=$(echo "$ALL_COMMITS" | jq '
            [.[] | {date: .date[0:10]}] |
            group_by(.date) |
            [.[] | {date: .[0].date, count: length}] |
            sort_by(.date)')

          # ── Build commits by month ──
          COMMITS_BY_MONTH=$(echo "$ALL_COMMITS" | jq '
            [.[] | {month: .date[0:7]}] |
            group_by(.month) |
            [.[] | {month: .[0].month, count: length}] |
            sort_by(.month)')

          # ── Commits by hour ──
          COMMITS_BY_HOUR=$(echo "$ALL_COMMITS" | jq '
            [.[] | .date[11:13]] |
            group_by(.) |
            [.[] | {hour: (.[0] | tonumber), count: length}] |
            sort_by(.hour)')

          # ── Languages ──
          LANGUAGES=$(echo "$REPOS" | jq '[.[].language | select(. != null)] | group_by(.) | [.[] | {lang: .[0], count: length}] | sort_by(-.count)')

          # ── Streak (consecutive days with commits, counting back from today) ──
          STREAK=$(echo "$COMMITS_BY_DAY" | jq --arg today "$(date -u +%Y-%m-%d)" '
            [.[] | .date] as $dates |
            {streak: 0, check: $today, skip: 0, done: false} |
            until(.done;
              .check as $c |
              if ($dates | index($c)) then
                .streak += 1 |
                .check = ($c | strptime("%Y-%m-%d") | mktime - 86400 | strftime("%Y-%m-%d"))
              elif .streak == 0 and .skip < 1 then
                .skip += 1 |
                .check = ($c | strptime("%Y-%m-%d") | mktime - 86400 | strftime("%Y-%m-%d"))
              else
                .done = true
              end
            ) | .streak')

          # ── Recent commits for feed (sorted by date, last 20) ──
          RECENT_COMMITS=$(echo "$ALL_COMMITS" | jq '[sort_by(.date) | reverse | .[0:25] |
            .[] | {repo: .repo, date: .date, sha: .sha, message: .message}]')

          # ── Build final JSON ──
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
            --arg username "$USERNAME" \
            --argjson repo_count "$REPO_COUNT" \
            --argjson originals "$ORIGINALS" \
            --argjson forks "$FORKS" \
            --argjson total_commits "$TOTAL_COMMITS" \
            --argjson streak "${STREAK:-0}" \
            --argjson commits_by_day "$COMMITS_BY_DAY" \
            --argjson commits_by_month "$COMMITS_BY_MONTH" \
            --argjson commits_by_hour "$COMMITS_BY_HOUR" \
            --argjson recent_commits "$RECENT_COMMITS" \
            --argjson repo_details "$REPO_DETAILS" \
            --argjson languages "$LANGUAGES" \
            --arg updated "$NOW" \
            '{
              username: $username,
              updated: $updated,
              repos: { total: $repo_count, original: $originals, forks: $forks },
              total_commits: $total_commits,
              streak: $streak,
              commits_by_day: $commits_by_day,
              commits_by_month: $commits_by_month,
              commits_by_hour: $commits_by_hour,
              recent_commits: $recent_commits,
              repo_details: $repo_details,
              languages: $languages
            }' > my-analytics/data.json

          echo "=== DONE ==="
          cat my-analytics/data.json | jq '{total_commits, streak, days: (.commits_by_day | length), recent: (.recent_commits | length)}'

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add my-analytics/data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update analytics data [automated]"
            git push
          fi
